<div class="home-container">
  <!-- Hero Section -->
  <section class="hero-section text-center py-5 bg-light">
    <div class="container">
      <h1 class="display-4 fw-bold mb-3">Welcome to Our Store</h1>
      <p class="lead mb-4">Discover amazing products at great prices</p>
      <a routerLink="/products" class="btn btn-primary btn-lg">
        <i class="fas fa-shopping-bag me-2"></i>Shop Now
      </a>
    </div>
  </section>

  <!-- Categories Section -->
  <section class="categories-section py-5">
    <div class="container">
      <h2 class="text-center mb-5">Browse Categories</h2>
      <div *ngIf="isLoading" class="text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      <div *ngIf="!isLoading" class="row">
        <div class="col-md-4 mb-4" *ngFor="let category of categories">
          <div class="card category-card h-100 shadow-sm">
            <div class="card-body text-center">
              <i class="fas fa-tag fa-3x mb-3 text-primary"></i>
              <h5 class="card-title">{{category.name}}</h5>
              <a [routerLink]="['/products/category', category.slug]" class="btn btn-outline-primary mt-2">
                View Products
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Featured Products Section -->
  <section class="featured-section py-5 bg-light">
    <div class="container">
      <h2 class="text-center mb-5">Featured Products</h2>
      <div *ngIf="featuredProducts.length === 0 && !isLoading" class="text-center">
        <p class="text-muted">No featured products available</p>
      </div>
      <div class="row">
        <div class="col-md-3 mb-4" *ngFor="let product of featuredProducts">
          <div class="card product-card h-100 shadow-sm">
            <img [src]="product.images[0] || 'https://via.placeholder.com/300'" 
                 [alt]="product.name"
                 class="card-img-top">
            <div class="card-body">
              <h5 class="card-title">{{product.name}}</h5>
              <p class="card-text text-muted">{{product.description | slice:0:60}}...</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="h5 text-primary mb-0">${{product.price}}</span>
                <span class="badge bg-success">
                  <i class="fas fa-star me-1"></i>{{product.rating}}
                </span>
              </div>
            </div>
            <div class="card-footer bg-transparent">
              <a [routerLink]="['/products', product._id]" class="btn btn-primary w-100">
                <i class="fas fa-eye me-2"></i>View Details
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
